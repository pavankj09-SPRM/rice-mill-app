<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill - Enterprise</title>
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" data-tab="hulling-tab">Hulling</div>
    <div class="nav-item" data-tab="stock-tab">Inventory</div>
    <div class="nav-item" data-tab="expenses-tab">Bills</div>
    <div class="nav-item" data-tab="history-tab">History</div>
    <div class="nav-item" data-tab="dashboard-tab">Dashboard</div>
    <div class="nav-item" data-tab="settings-tab">Settings</div>
</div>

<div id="toast">Saved Successfully!</div>

<div class="container">
    <div class="card date-header">
        <label>📅 SELECTED DATE:</label>
        <input type="date" id="main_date_picker">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Hulling Entry</h3>
            <input type="text" id="h_name" placeholder="Customer Name">
            <input type="number" step="0.01" id="h_weight" placeholder="Paddy Weight (Ex: 1.50)">
            <div class="grid-2">
                <input type="number" id="h_rate" value="150">
                <select id="h_status">
                    <option value="Paid">Paid</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
            <input type="number" id="h_total_input" readonly class="readonly-total">
            <button id="btn_save_hulling">Save & Record</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Inventory Movement</h3>
            <select id="st_action">
                <option value="Purchase">Purchase (Stock In)</option>
                <option value="Sale">Sale (Stock Out)</option>
            </select>
            <select id="st_type"></select>
            <input type="text" id="st_name" placeholder="Party Name">
            <div class="grid-2">
                <input type="number" step="0.01" id="st_weight" placeholder="Weight">
                <input type="number" id="st_rate" placeholder="Rate">
            </div>
            <input type="number" id="st_amount" placeholder="Total Amount (₹)">
            <button id="btn_save_stock" class="bg-secondary">Save Stock Entry</button>
        </div>
    </div>

    <div id="expenses-tab" class="tab-content">
        <div class="card">
            <h3>Bills & Payments</h3>
            <div class="grid-2 mb-15">
                <button id="btn_auto_labour" class="bg-edit">Auto Labours</button>
                <button id="btn_set_elec" class="bg-secondary">⚡ Electricity</button>
            </div>
            <select id="exp_type_cat">
                <option value="Wages">Labour Wages</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Other">Other Expenses</option>
            </select>
            <input type="text" id="exp_name" placeholder="Details">
            <input type="number" id="exp_amount" placeholder="Amount (₹)">
            <button id="btn_save_expense" class="bg-danger">Save Payment</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <h3>Reports & Export</h3>
            <div class="grid-2">
                <button id="btn_export_excel" class="bg-success">📥 Excel</button>
                <button id="btn_export_pdf" class="bg-danger">📄 Daily PDF</button>
            </div>
        </div>
        <div class="card"><h3>Daily Activity Log</h3><div id="day_log"></div></div>
        <div class="card">
            <h3>Inventory Summary</h3>
            <div class="grid-2 mb-15">
                <button class="view-toggle active" data-view="month">Month</button>
                <button class="view-toggle" data-view="year">Year</button>
            </div>
            <div id="summary_display"></div>
        </div>
    </div>

    <div id="dashboard-tab" class="tab-content">
        <div class="dash-grid" id="dash_stats_container"></div>
        <div class="card chart-container"><canvas id="financeChart"></canvas></div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card">
            <h3>Add Variety</h3>
            <input type="text" id="new_item_val" placeholder="Variety Name">
            <select id="new_item_cat">
                <option value="paddy">Paddy</option>
                <option value="rice">Rice</option>
                <option value="misc">Misc</option>
            </select>
            <button id="btn_add_variety">+ Add to List</button>
        </div>
        <div id="settings_grid"></div>
        <div class="card text-center">
            <h3>System</h3>
            <button id="btn_backup" class="btn-sec">Backup (.json)</button>
            <input type="file" id="import_file" style="display:none;">
            <button id="btn_restore_trigger" class="btn-sec bg-gray">Restore File</button>
        </div>
    </div>
</div>

<script src="js/db.js"></script>
<script src="js/logic.js"></script>
<script src="js/app.js"></script>

</body>
</html>
