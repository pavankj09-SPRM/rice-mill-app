<div id="settings-tab" class="tab-content">
    <div class="card">
        <h3>🌾 Add Varieties</h3>
        <input type="text" id="new_item_name" placeholder="Variety Name">
        <select id="new_item_category">
            <option value="Paddy">Paddy</option>
            <option value="Rice">Rice</option>
        </select>
        <button onclick="addNewVariety()">+ Add Variety</button>
    </div>

    <div class="card">
        <h3>💾 Data Management</h3>
        <button onclick="exportData()" style="background: #4CAF50;">Export Backup</button>
        <button onclick="document.getElementById('importFile').click()" style="background: #2196F3;">Restore Backup</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>
</div>
